{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MiniEDR | Secure Login</title>

  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+3:300,400,400i,700&display=fallback">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- AdminLTE 4 CSS -->
  <link rel="stylesheet" href="{% static 'adminlte/dist/css/adminlte.min.css' %}">

  <style>
    :root {
      --bg-dark: #060918;
      --card-bg: rgba(15, 23, 42, 0.8);
      --accent-cyan: #22d3ee;
      --accent-blue: #3b82f6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body.login-page {
      background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
      background-size: cover;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: 'Inter', 'Source Sans 3', sans-serif;
      overflow: hidden;
    }

    /* Ambient Background Effect */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(at 0% 0%, rgba(34, 211, 238, 0.1) 0, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0, transparent 50%);
      pointer-events: none;
    }

    .login-box {
      width: 440px;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    .login-logo a {
      color: var(--text-main) !important;
      font-size: 2.5rem;
      font-weight: 800;
      text-decoration: none;
      text-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
      letter-spacing: -0.025em;
    }

    .card {
      background: transparent !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8), 0 0 20px rgba(34, 211, 238, 0.1);
    }

    .card-body, .login-card-body {
      padding: 40px !important;
      background: transparent !important;
    }

    .login-box-msg {
      color: var(--accent-cyan);
      font-weight: 600;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 30px !important;
      text-align: center;
    }

    /* Input Fields Styling */
    .input-group {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .input-group:focus-within {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }

    .form-control {
      background: transparent !important;
      border: none !important;
      color: var(--text-main) !important;
      padding: 14px 16px !important;
      font-size: 1rem;
    }

    .form-control::placeholder {
      color: rgba(148, 163, 184, 0.5) !important;
      /* Visible muted color */
    }

    .input-group-text {
      background: transparent !important;
      border: none !important;
      color: var(--accent-cyan) !important;
      padding-right: 18px;
    }

    /* Checkbox Styling */
    .form-check {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 0;
    }

    .form-check-input {
      width: 18px;
      height: 18px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: 0;
      cursor: pointer;
    }

    .form-check-input:checked {
      background-color: var(--accent-cyan);
      border-color: var(--accent-cyan);
    }

    .form-check-label {
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
    }

    /* Button Styling */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue), #1d4ed8);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.6);
      filter: brightness(1.1);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* Alert Styling */
    .alert-danger {
      background: rgba(239, 68, 68, 0.1) !important;
      border: 1px solid rgba(239, 68, 68, 0.2) !important;
      color: #fca5a5 !important;
      border-radius: 10px;
    }

    /* Links */
    .recover-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .recover-link:hover {
      color: var(--accent-cyan);
    }
  </style>
</head>

<body class="login-page">
  <div class="login-box">
    <div class="login-logo text-center mb-4">
      <a href="/"><i class="fas fa-shield-virus me-2 text-primary"></i><b>Mini</b>EDR</a>
    </div>

    <div class="card shadow-lg">
      <div class="card-body login-card-body">
        <p class="login-box-msg">Cyber Threat Intelligence Access</p>

        {% if form.errors %}
        <div class="alert alert-danger mb-4">
          <i class="fas fa-exclamation-circle me-1"></i> Invalid credentials. Please try again.
        </div>
        {% endif %}

        <form action="{% url 'login' %}" method="post">
          {% csrf_token %}
          <div class="input-group mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required autofocus>
            <span class="input-group-text">
              <i class="fas fa-user-shield"></i>
            </span>
          </div>
          <div class="input-group mb-4">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <span class="input-group-text">
              <i class="fas fa-lock"></i>
            </span>
          </div>
          <div class="row align-items-center mb-1">
            <div class="col-7">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">
                  Keep me logged in
                </label>
              </div>
            </div>
            <div class="col-5">
              <button type="submit" class="btn btn-primary w-100">Authorize</button>
            </div>
          </div>
        </form>

        <div class="mt-4 pt-3 border-top border-white border-opacity-10 text-center">
          <a href="#" class="recover-link">
            <i class="fas fa-key me-1"></i> Recover Access
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'adminlte/dist/js/adminlte.min.js' %}"></script>
</body>

</html>
